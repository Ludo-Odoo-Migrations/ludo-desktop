name: LudoDesktop
options:
  bundleIdPrefix: de.euroblaze
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  LudoDesktop:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.euroblaze.ludodesktop
        PRODUCT_NAME: "LUDO Desktop"
        CODE_SIGN_ENTITLEMENTS: Sources/LudoDesktop/Support/LudoDesktop.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Sources/LudoDesktop/Support/Info.plist
      properties:
        CFBundleDisplayName: "LUDO Desktop"
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: "public.app-category.developer-tools"
        # Browser-redirect login: the OAuth callback returns to this custom scheme.
        CFBundleURLTypes:
          - CFBundleURLName: de.euroblaze.ludodesktop.auth
            CFBundleURLSchemes:
              - ludo-desktop
  # Unit tests (backoff policy, …). macOS-only toolchain: runs in Xcode/CI,
  # not in run_dev.sh's swiftc build (which globs Sources only). Desktop
  # test-infra placement is tracked in euroblaze/ludo-tests#5.
  LudoDesktopTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: LudoDesktop
