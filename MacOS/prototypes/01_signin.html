<!doctype html><html><head><meta charset="utf-8"><style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;background:#fff;padding:0;-webkit-font-smoothing:antialiased}
.win{width:880px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,.12)}
.tbar{height:46px;display:flex;align-items:center;gap:10px;padding:0 14px;background:linear-gradient(#fbfbfd,#eef0f3);border-bottom:1px solid #e2e2e6}
.lights{display:flex;gap:8px}.lights i{width:12px;height:12px;border-radius:50%;display:inline-block}
.r{background:#ff5f57}.y{background:#febc2e}.g{background:#28c840}
.stage{height:560px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,#ffffff,#f3f5f9)}
.card{width:380px;text-align:center}
.logo{font-size:40px;font-weight:800;letter-spacing:-1px;color:#0b1020;margin-bottom:2px}
.logo span{color:#007aff}
.tag{font-size:14px;color:#86868b;margin-bottom:40px}
.gh{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:46px;background:#1b1f24;color:#fff;border-radius:10px;font-size:15px;font-weight:600;border:none}
.gh svg{width:20px;height:20px;fill:#fff}
.hint{margin-top:18px;font-size:12px;color:#9a9aa0;line-height:1.6}
.foot{margin-top:34px;font-size:11px;color:#b0b0b6}
</style></head><body>
<div class="win">

    </div>
  </div>
</div>
</body></html>
